<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="777" cy="224" r="28" fill="#880e4f" opacity="0.06"/>
    <circle cx="1106" cy="488" r="55" fill="#880e4f" opacity="0.10"/>
    <circle cx="279" cy="218" r="29" fill="#880e4f" opacity="0.15"/>
    <circle cx="950" cy="327" r="77" fill="#880e4f" opacity="0.07"/>
    <circle cx="87" cy="351" r="32" fill="#880e4f" opacity="0.09"/>
    <circle cx="695" cy="-55" r="43" fill="#880e4f" opacity="0.10"/>
    <rect x="1" y="603" width="29" height="49" rx="8" fill="#b71c1c" opacity="0.15" transform="rotate(12, 1244, -12)"/>
    <rect x="-6" y="440" width="52" height="78" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(34, 1, 4)"/>
    <rect x="88" y="566" width="50" height="35" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(22, 1208, 164)"/>
    <rect x="1068" y="536" width="68" height="64" rx="8" fill="#b71c1c" opacity="0.11" transform="rotate(19, 708, 395)"/>
    <rect x="190" y="672" width="72" height="34" rx="8" fill="#b71c1c" opacity="0.11" transform="rotate(19, 543, 69)"/>
    <rect x="107" y="448" width="81" height="29" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(14, 1017, 437)"/>
    <rect x="-42" y="-76" width="31" height="57" rx="8" fill="#b71c1c" opacity="0.08" transform="rotate(32, 94, 254)"/>
    <rect x="716" y="188" width="82" height="24" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(8, 387, 102)"/>
    <polygon points="4,101 44,181 -36,181" fill="#880e4f" opacity="0.10"/>
    <polygon points="827,-122 859,-58 795,-58" fill="#880e4f" opacity="0.05"/>
    <polygon points="154,309 212,425 96,425" fill="#880e4f" opacity="0.10"/>
    <polygon points="149,371 227,527 71,527" fill="#880e4f" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,550 C360,590 840,510 1200,550 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    화곡 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 네트워크 보안
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 화곡 셔츠룸 — 네트워크 보안
  </text>
</svg>